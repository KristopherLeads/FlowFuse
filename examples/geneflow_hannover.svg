<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="200" height="200" rx="36" fill="#ffffff"/>
  <!-- Icon background -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="#1A1A2E"/>

  <!-- DNA double helix strands -->
  <!-- Left strand (amber) -->
  <path d="M74 38 C60 58,100 78,74 98 C50 118,100 138,74 162" fill="none" stroke="#EF9F27" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right strand (teal) -->
  <path d="M126 38 C140 58,100 78,126 98 C150 118,100 138,126 162" fill="none" stroke="#1D9E75" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Rungs -->
  <line x1="74" y1="38" x2="126" y2="38" stroke="#534AB7" stroke-width="2.5" stroke-linecap="round" opacity=".85"/>
  <line x1="66" y1="55" x2="134" y2="55" stroke="#534AB7" stroke-width="2" stroke-linecap="round" opacity=".65"/>
  <line x1="84" y1="70" x2="116" y2="70" stroke="#534AB7" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <line x1="95" y1="85" x2="105" y2="85" stroke="#534AB7" stroke-width="2" stroke-linecap="round" opacity=".4"/>
  <line x1="84" y1="98" x2="116" y2="98" stroke="#534AB7" stroke-width="2" stroke-linecap="round" opacity=".5"/>
  <line x1="66" y1="113" x2="134" y2="113" stroke="#534AB7" stroke-width="2" stroke-linecap="round" opacity=".65"/>
  <line x1="74" y1="130" x2="126" y2="130" stroke="#534AB7" stroke-width="2.5" stroke-linecap="round" opacity=".85"/>
  <line x1="66" y1="146" x2="134" y2="146" stroke="#534AB7" stroke-width="2" stroke-linecap="round" opacity=".65"/>
  <line x1="74" y1="162" x2="126" y2="162" stroke="#534AB7" stroke-width="2.5" stroke-linecap="round" opacity=".85"/>

  <!-- Node dots -->
  <circle cx="74" cy="38" r="5" fill="#EF9F27"/>
  <circle cx="126" cy="38" r="5" fill="#1D9E75"/>
  <circle cx="74" cy="98" r="6" fill="#EF9F27"/>
  <circle cx="126" cy="98" r="6" fill="#1D9E75"/>
  <circle cx="74" cy="162" r="5" fill="#EF9F27"/>
  <circle cx="126" cy="162" r="5" fill="#1D9E75"/>

  <!-- GF·HAN label -->
  <text x="100" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#534AB7" letter-spacing="2">GF · HAN</text>
</svg>
