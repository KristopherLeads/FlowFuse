<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="200" height="200" rx="36" fill="#ffffff"/>
  <!-- Icon background -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="#0E1F1A"/>

  <!-- Sky glow arcs behind sun -->
  <path d="M28 126 Q100 34,172 126" fill="#0F6E56" opacity=".45"/>
  <path d="M38 130 Q100 52,162 130" fill="#1D9E75" opacity=".3"/>

  <!-- Rising sun -->
  <circle cx="100" cy="90" r="28" fill="#E24B4A" opacity=".92"/>
  <circle cx="100" cy="90" r="21" fill="#F09595" opacity=".45"/>
  <circle cx="100" cy="90" r="13" fill="#FCEBEB" opacity=".3"/>

  <!-- Radiating rays (DNA-like, 8 directions) -->
  <line x1="100" y1="58" x2="100" y2="44" stroke="#FAC775" stroke-width="2.5" stroke-linecap="round" opacity=".9"/>
  <line x1="120" y1="62" x2="132" y2="52" stroke="#FAC775" stroke-width="2.5" stroke-linecap="round" opacity=".85"/>
  <line x1="128" y1="84" x2="144" y2="84" stroke="#FAC775" stroke-width="2.5" stroke-linecap="round" opacity=".9"/>
  <line x1="120" y1="108" x2="132" y2="118" stroke="#FAC775" stroke-width="2" stroke-linecap="round" opacity=".7"/>
  <line x1="100" y1="118" x2="100" y2="132" stroke="#FAC775" stroke-width="2" stroke-linecap="round" opacity=".65"/>
  <line x1="80"  y1="108" x2="68"  y2="118" stroke="#FAC775" stroke-width="2" stroke-linecap="round" opacity=".7"/>
  <line x1="72"  y1="84"  x2="56"  y2="84"  stroke="#FAC775" stroke-width="2.5" stroke-linecap="round" opacity=".9"/>
  <line x1="80"  y1="62"  x2="68"  y2="52"  stroke="#FAC775" stroke-width="2.5" stroke-linecap="round" opacity=".85"/>

  <!-- Tokyo Bay water ripples -->
  <path d="M28 146 Q60 139,92 146 Q124 153,152 146 Q164 142,172 146" fill="none" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" opacity=".8"/>
  <path d="M28 157 Q65 151,100 157 Q135 163,172 157" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" opacity=".55"/>
  <path d="M36 167 Q72 162,108 167 Q140 172,164 167" fill="none" stroke="#1D9E75" stroke-width="1" stroke-linecap="round" opacity=".35"/>

  <!-- Small boat (Funabashi = "boat bridge") -->
  <path d="M76 140 Q100 133,124 140 L119 150 Q100 155,81 150 Z" fill="#5DCAA5" opacity=".75"/>
  <line x1="100" y1="133" x2="100" y2="120" stroke="#9FE1CB" stroke-width="2" stroke-linecap="round" opacity=".8"/>
  <!-- Sail -->
  <path d="M100 121 L116 132 L100 133 Z" fill="#9FE1CB" opacity=".6"/>

  <!-- Label -->
  <text x="100" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#1D9E75" letter-spacing="2">GF · FNB</text>
</svg>
