<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="200" height="200" rx="36" fill="#ffffff"/>
  <!-- Icon background -->
  <rect x="20" y="20" width="160" height="160" rx="28" fill="#0D2340"/>

  <!-- Night sky stars -->
  <circle cx="44" cy="38" r="1.5" fill="#B5D4F4" opacity=".8"/>
  <circle cx="76" cy="32" r="1.2" fill="#B5D4F4" opacity=".7"/>
  <circle cx="110" cy="36" r="1.8" fill="#FAC775" opacity=".85"/>
  <circle cx="148" cy="30" r="1.2" fill="#B5D4F4" opacity=".7"/>
  <circle cx="162" cy="44" r="1.4" fill="#B5D4F4" opacity=".6"/>
  <circle cx="130" cy="40" r="1" fill="#B5D4F4" opacity=".6"/>

  <!-- Water (bay) -->
  <rect x="20" y="138" width="160" height="42" rx="0" fill="#0a3060" opacity=".9"/>
  <path d="M20 142 Q50 136,80 142 Q110 148,140 142 Q158 138,180 142" fill="none" stroke="#378ADD" stroke-width="1.2" stroke-linecap="round" opacity=".6"/>
  <path d="M20 152 Q55 147,90 152 Q120 157,160 152" fill="none" stroke="#378ADD" stroke-width="1" stroke-linecap="round" opacity=".4"/>

  <!-- Bridge deck -->
  <rect x="28" y="118" width="144" height="6" rx="2" fill="#378ADD" opacity=".9"/>

  <!-- Left tower -->
  <rect x="50" y="58" width="14" height="64" rx="3" fill="#E24B4A"/>
  <rect x="46" y="52" width="22" height="9" rx="2" fill="#F09595"/>
  <!-- Left tower crossbar -->
  <rect x="50" y="80" width="14" height="4" rx="1" fill="#C03030" opacity=".7"/>

  <!-- Right tower -->
  <rect x="136" y="58" width="14" height="64" rx="3" fill="#E24B4A"/>
  <rect x="132" y="52" width="22" height="9" rx="2" fill="#F09595"/>
  <!-- Right tower crossbar -->
  <rect x="136" y="80" width="14" height="4" rx="1" fill="#C03030" opacity=".7"/>

  <!-- Main suspension cables (helix-like curves) -->
  <path d="M57 58 Q100 88,143 58" fill="none" stroke="#FAC775" stroke-width="2.5" opacity=".9"/>
  <path d="M57 68 Q100 98,143 68" fill="none" stroke="#FAC775" stroke-width="1.8" opacity=".6"/>

  <!-- Vertical hangers -->
  <line x1="72"  y1="68" x2="72"  y2="121" stroke="#B5D4F4" stroke-width="1.2" opacity=".55"/>
  <line x1="86"  y1="75" x2="86"  y2="121" stroke="#B5D4F4" stroke-width="1.2" opacity=".55"/>
  <line x1="100" y1="78" x2="100" y2="121" stroke="#B5D4F4" stroke-width="1.2" opacity=".55"/>
  <line x1="114" y1="75" x2="114" y2="121" stroke="#B5D4F4" stroke-width="1.2" opacity=".55"/>
  <line x1="128" y1="68" x2="128" y2="121" stroke="#B5D4F4" stroke-width="1.2" opacity=".55"/>

  <!-- DNA base pair dots along water -->
  <circle cx="55"  cy="145" r="3" fill="#378ADD" opacity=".8"/>
  <circle cx="82"  cy="148" r="2.5" fill="#1D9E75" opacity=".7"/>
  <circle cx="110" cy="146" r="3" fill="#378ADD" opacity=".8"/>
  <circle cx="138" cy="149" r="2.5" fill="#378ADD" opacity=".6"/>

  <!-- Label -->
  <text x="100" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="700" fill="#378ADD" letter-spacing="2">GF · SFO</text>
</svg>
